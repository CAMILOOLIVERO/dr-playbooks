---
- name: DR Recovery - Levantar VM caida en Azure
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    subscription_id: "1fefe992-e8e2-472d-bb8a-bac89bf7b525"
    resource_group: "rg-monitoreo"
    vm_name: "vm-target-dr"
    callback_url: "https://default95028a14d2f943c0bc7342a4be7c04.92.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/234e03f98e064bc19eed5b1b3daf796f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=AME72QUsPPNekXE5plbxq1PLdMBIvAUsEZ7WthyT8Zo"

  tasks:
    - name: Autenticar con Managed Identity
      uri:
        url: "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/"
        headers:
          Metadata: "true"
        method: GET
      register: auth_response

    - name: Extraer token
      set_fact:
        access_token: "{{ auth_response.json.access_token }}"

    - name: Levantar vm-target-dr
      uri:
        url: "https://management.azure.com/subscriptions/{{ subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Compute/virtualMachines/{{ vm_name }}/start?api-version=2023-03-01"
        method: POST
        headers:
          Authorization: "Bearer {{ access_token }}"
          Content-Type: "application/json"
        status_code: [200, 202]
      register: start_result

    - name: Esperar 60 segundos para que la VM inicie
      wait_for:
        timeout: 60

    - name: Verificar estado de la VM
      uri:
        url: "https://management.azure.com/subscriptions/{{ subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Compute/virtualMachines/{{ vm_name }}/instanceView?api-version=2023-03-01"
        method: GET
        headers:
          Authorization: "Bearer {{ access_token }}"
      register: vm_status

    - name: Reportar resultado exitoso
      debug:
        msg: "VM {{ vm_name }} levantada exitosamente - Estado: {{ vm_status.json.statuses | map(attribute='displayStatus') | list }}"

    - name: Notificar a Power Automate
      uri:
        url: "{{ callback_url }}"
        method: POST
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          status: "success"
          vm: "{{ vm_name }}"
          mensaje: "VM {{ vm_name }} levantada exitosamente"
          duracion: "{{ ansible_date_time.time }}"
        status_code: [200, 202, 204]
      ignore_errors: yes
